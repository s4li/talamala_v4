<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}طلاملا{% endblock %}</title>

    <!-- Bootstrap 5 RTL (local) -->
    <link rel="stylesheet" href="/static/vendor/bootstrap/css/bootstrap.rtl.min.css?v={{ STATIC_VER }}">

    <!-- Bootstrap Icons (local) -->
    <link rel="stylesheet" href="/static/vendor/bootstrap-icons/font/bootstrap-icons.min.css?v={{ STATIC_VER }}">

    <!-- TalaMala Design System -->
    <link rel="stylesheet" href="/static/css/talamala-design-system.css?v={{ STATIC_VER }}">

    <!-- Bootstrap Bridge (reskins Bootstrap to match DS palette) -->
    <link rel="stylesheet" href="/static/css/bootstrap-bridge.css?v={{ STATIC_VER }}">

    <!-- TalaMala Animations -->
    <link rel="stylesheet" href="/static/css/talamala-animations.css?v={{ STATIC_VER }}">

    <!-- TalaMala Mobile Responsive -->
    <link rel="stylesheet" href="/static/css/mobile-responsive.css?v={{ STATIC_VER }}">

    {% block extra_css %}{% endblock %}
</head>
<body class="d-flex flex-column min-vh-100">
    {% block body %}{% endblock %}

    <!-- Bootstrap JS (local) -->
    <script src="/static/vendor/bootstrap/js/bootstrap.bundle.min.js?v={{ STATIC_VER }}"></script>

    <!-- Scroll Reveal + Navbar Shadow -->
    <script>
    (function(){
      var els=document.querySelectorAll('.tm-reveal,.tm-reveal-left,.tm-reveal-right,.tm-reveal-scale');
      if(els.length){var obs=new IntersectionObserver(function(entries){entries.forEach(function(e){if(e.isIntersecting){e.target.classList.add('tm-visible');obs.unobserve(e.target);}});},{threshold:0.1,rootMargin:'0px 0px -40px 0px'});els.forEach(function(el){obs.observe(el);});}
      var nav=document.querySelector('.shop-navbar.sticky-top');
      if(nav){window.addEventListener('scroll',function(){nav.classList.toggle('scrolled',window.scrollY>10);},{passive:true});}
    })();
    </script>

    <!-- Persian/Arabic digit normalizer: auto-convert to English digits on all inputs -->
    <script>
    (function(){
      var map={'\u06F0':'0','\u06F1':'1','\u06F2':'2','\u06F3':'3','\u06F4':'4','\u06F5':'5','\u06F6':'6','\u06F7':'7','\u06F8':'8','\u06F9':'9','\u0660':'0','\u0661':'1','\u0662':'2','\u0663':'3','\u0664':'4','\u0665':'5','\u0666':'6','\u0667':'7','\u0668':'8','\u0669':'9'};
      var re=/[\u06F0-\u06F9\u0660-\u0669]/g;
      function normalize(s){return s.replace(re,function(c){return map[c]||c;});}
      document.addEventListener('input',function(e){
        var el=e.target;
        if(el.tagName==='INPUT'||el.tagName==='TEXTAREA'){
          var v=el.value;
          var n=normalize(v);
          if(v!==n){
            var start=el.selectionStart,end=el.selectionEnd;
            el.value=n;
            if(typeof start==='number'){el.setSelectionRange(start,end);}
          }
        }
      },true);
    })();
    </script>

    {% block extra_js %}{% endblock %}
</body>
</html>
